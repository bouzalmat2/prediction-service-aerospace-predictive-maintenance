apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
  spec:
    containers:
    - name: mlflow-server
      image: ghcr.io/mlflow/mlflow:v2.14.1
      command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]
      ports:
      - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: argocd
spec:
  selector:
    app: mlflow-server
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
